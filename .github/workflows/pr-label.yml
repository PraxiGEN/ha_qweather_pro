name: Auto Label PR Type

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest

    steps:

      - name: Detect PR Type and Add Label
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        shell: bash
        run: |

          echo "Checking PR_TYPE"


          PR_TYPE=$(echo "$PR_BODY" \
            | grep -oE '<!-- PR_TYPE:[^>]+ -->' \
            | sed -E 's/<!-- PR_TYPE:(.*) -->/\1/' \
            | xargs)


          if [[ -z "$PR_TYPE" ]]; then
            echo "❌ Missing PR_TYPE"
            exit 1
          fi


          echo "Detected PR_TYPE: $PR_TYPE"


          case "$PR_TYPE" in
            bugfix)
              LABEL="bugfix"
              ;;
            "new feature")
              LABEL="feature"
              ;;
            refactor)
              LABEL="refactor"
              ;;
            breaking)
              LABEL="breaking"
              ;;
            docs)
              LABEL="docs"
              ;;
            *)
              echo "❌ Invalid PR_TYPE: $PR_TYPE"
              exit 1
              ;;
          esac


          echo "Adding label: $LABEL"


          gh pr edit "$PR_NUMBER" \
            --repo "$REPO" \
            --add-label "$LABEL"


          echo "✅ Label added"
